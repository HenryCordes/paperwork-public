name: CI

on:
  push:
  pull_request:

jobs:
  server:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install
      - name: Typecheck
        run: npm run typecheck
      - name: Lint
        run: npm run lint
      - name: Format check
        run: npm run format:check
      - name: Test
        run: npm test
      - name: Coverage summary
        if: always()
        run: node scripts/coverage-summary.js "Server coverage (gate 75/75/75/60)" 75 75 75 60 >> "$GITHUB_STEP_SUMMARY"

  client:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install client dependencies
        run: npm install
      - name: Client typecheck
        run: npx tsc --noEmit -p tsconfig.json
      - name: Client tests
        run: npx craco test --watchAll=false --coverage
      - name: Coverage summary
        if: always()
        run: node ../scripts/coverage-summary.js "Client coverage (gate 65/65/65/55)" 65 65 65 55 >> "$GITHUB_STEP_SUMMARY"
